  ChatApiThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-chat-api-throttles'
      AlarmDescription: !Sub 'Throttles >= ${ThrottleThreshold} for ${ChatApiFunctionName}'
      Namespace: AWS/Lambda
