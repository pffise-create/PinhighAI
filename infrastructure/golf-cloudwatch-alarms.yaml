      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  # ── Chat API handler ──────────────────────────────────────────────────────
  ChatApiErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-chat-api-errors'
      AlarmDescription: !Sub 'Errors >= ${ErrorThreshold} for ${ChatApiFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ChatApiFunctionName
      Statistic: Sum
      Period: 60
