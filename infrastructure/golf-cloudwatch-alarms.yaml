AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch alarms for Golf Coach Lambda reliability and latency.

Parameters:
  ProjectName:
    Type: String
    Default: golf-coach
  Environment:
    Type: String
    Default: prod
  AlarmTopicArn:
    Type: String
    Default: ''
    Description: Optional SNS topic ARN for alarm notifications.

  UploadHandlerFunctionName:
    Type: String
    Default: golf-video-upload-handler
  FrameExtractorFunctionName:
    Type: String
    Default: golf-frame-extractor-simple
  AiAnalysisFunctionName:
    Type: String
    Default: golf-ai-analysis-processor
  ResultsApiFunctionName:
    Type: String
    Default: golf-results-api-handler
  ChatApiFunctionName:
    Type: String
    Default: golf-chat-api-handler

  ErrorThreshold:
    Type: Number
    Default: 1
    Description: Errors per minute that triggers an alarm (sum over 1 minute).
  ThrottleThreshold:
    Type: Number
    Default: 1
    Description: Throttles per minute that triggers an alarm (sum over 1 minute).

  ChatApiP95Ms:
    Type: Number
    Default: 3000
    Description: p95 duration alarm threshold for chat API (ms).
  ResultsApiP95Ms:
    Type: Number
    Default: 2000
    Description: p95 duration alarm threshold for results API (ms).
  UploadP95Ms:
    Type: Number
    Default: 10000
    Description: p95 duration alarm threshold for upload handler (ms).
  FrameExtractorP95Ms:
    Type: Number
    Default: 20000
    Description: p95 duration alarm threshold for frame extractor (ms).
  AiAnalysisP95Ms:
    Type: Number
    Default: 45000
    Description: p95 duration alarm threshold for AI analysis processor (ms).

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, '']]

Resources:
  # ── Upload handler ────────────────────────────────────────────────────────
  UploadErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-upload-errors'
      AlarmDescription: !Sub 'Errors >= ${ErrorThreshold} for ${UploadHandlerFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UploadHandlerFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ErrorThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  UploadThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-upload-throttles'
      AlarmDescription: !Sub 'Throttles >= ${ThrottleThreshold} for ${UploadHandlerFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref UploadHandlerFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ThrottleThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  UploadDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-upload-duration-p95'
      AlarmDescription: !Sub 'p95 duration >= ${UploadP95Ms}ms for ${UploadHandlerFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref UploadHandlerFunctionName
      ExtendedStatistic: p95
      Period: 60
      EvaluationPeriods: 3
      Threshold: !Ref UploadP95Ms
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  # ── Frame extractor ───────────────────────────────────────────────────────
  FrameExtractorErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-frame-extractor-errors'
      AlarmDescription: !Sub 'Errors >= ${ErrorThreshold} for ${FrameExtractorFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrameExtractorFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ErrorThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  FrameExtractorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-frame-extractor-throttles'
      AlarmDescription: !Sub 'Throttles >= ${ThrottleThreshold} for ${FrameExtractorFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrameExtractorFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ThrottleThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  FrameExtractorDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-frame-extractor-duration-p95'
      AlarmDescription: !Sub 'p95 duration >= ${FrameExtractorP95Ms}ms for ${FrameExtractorFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrameExtractorFunctionName
      ExtendedStatistic: p95
      Period: 60
      EvaluationPeriods: 3
      Threshold: !Ref FrameExtractorP95Ms
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  # ── AI analysis processor ─────────────────────────────────────────────────
  AiAnalysisErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-ai-analysis-errors'
      AlarmDescription: !Sub 'Errors >= ${ErrorThreshold} for ${AiAnalysisFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AiAnalysisFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ErrorThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  AiAnalysisThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-ai-analysis-throttles'
      AlarmDescription: !Sub 'Throttles >= ${ThrottleThreshold} for ${AiAnalysisFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref AiAnalysisFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ThrottleThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  AiAnalysisDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-ai-analysis-duration-p95'
      AlarmDescription: !Sub 'p95 duration >= ${AiAnalysisP95Ms}ms for ${AiAnalysisFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref AiAnalysisFunctionName
      ExtendedStatistic: p95
      Period: 60
      EvaluationPeriods: 3
      Threshold: !Ref AiAnalysisP95Ms
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  # ── Results API handler ───────────────────────────────────────────────────
  ResultsApiErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-results-api-errors'
      AlarmDescription: !Sub 'Errors >= ${ErrorThreshold} for ${ResultsApiFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ResultsApiFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ErrorThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref AWS::NoValue]

  ResultsApiThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-results-api-throttles'
      AlarmDescription: !Sub 'Throttles >= ${ThrottleThreshold} for ${ResultsApiFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ResultsApiFunctionName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ThrottleThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
