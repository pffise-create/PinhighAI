  ResultsApiDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-results-api-duration-p95'
      AlarmDescription: !Sub 'p95 duration >= ${ResultsApiP95Ms}ms for ${ResultsApiFunctionName}'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ResultsApiFunctionName
      ExtendedStatistic: p95
      Period: 60
      EvaluationPeriods: 3
