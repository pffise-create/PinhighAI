name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test -- --runInBand

      - name: Validate Expo web bundle
        run: npx expo export --platform web --clear
